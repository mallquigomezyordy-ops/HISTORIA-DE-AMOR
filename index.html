<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenida ❤️</title>

    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="corazones">

    <span>❤️</span>
    <span>💖</span>
    <span>💕</span>
    <span>💘</span>
    <span>💗</span>
    <span>💝</span>

</div>

<div class="login">

    <h1>❤️ Bienvenida ❤️</h1>

    <p class="mensaje">
        Hola mi fresita ❤️
        <br><br>
        Preparé un pequeño detalle donde guardaremos cada paso de nuestra 
        historia de amor.
        Espero que te guste mucho.
        <br><br>
        Escribe nuestra contraseña secreta❤️
    </p>

    <input
        type="password"
        id="clave"
        placeholder="Nuestra contraseña">

    <button onclick="verificar()">

        Entrar ❤️

    </button>

    <p id="error"></p>

</div>

<script src="login.js"></script>

</body>
</html>
